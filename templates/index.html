<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>逊龢在线NDK打包工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px 25px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .file-upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            background: #f8fafc;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .file-upload-area:hover, .file-upload-area.dragover {
            border-color: #667eea;
            background: #f1f5f9;
        }

        .file-upload-area.has-file {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .upload-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .upload-text {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 13px;
            color: #718096;
        }

        .file-name {
            margin-top: 15px;
            padding: 10px;
            background: #e6fffa;
            border-radius: 8px;
            color: #2c7a7b;
            font-size: 14px;
            word-break: break-all;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        #file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .requirements {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .requirements-title {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .requirements-list {
            list-style: none;
            color: #718096;
        }

        .requirements-list li {
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .requirements-list li:before {
            content: "📁";
            margin-right: 6px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(72, 187, 120, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(113, 128, 150, 0.4);
        }

        .progress-container {
            background: #edf2f7;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .progress-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #4a5568;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: #cbd5e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .log-area {
            background: #2d3748;
            color: #a0aec0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-area.error {
            color: #fc8181;
        }

        .log-area.success {
            color: #a0e7a0;
        }

        /* 文件列表样式 */
        .file-list {
            background: #edf2f7;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .file-list-title {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .file-item {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }

        .file-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .file-item.selected {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .file-info {
            flex: 1;
        }

        .file-name-so {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .file-meta {
            font-size: 12px;
            color: #718096;
            display: flex;
            gap: 10px;
        }

        .file-abi {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .file-size {
            color: #4a5568;
        }

        .download-icon {
            color: #48bb78;
            font-size: 20px;
        }

        .download-area {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f0fff4;
            border-radius: 10px;
            display: none;
        }

        .download-area.show {
            display: block;
        }

        .download-message {
            color: #2f855a;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
        }

        .debug-info {
            margin-top: 10px;
            font-size: 11px;
            color: #999;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>NDK在线打包by逊龢</h1>
        <div class="subtitle">支持多架构选择</div>

       
        <div style="text-align: right; margin-bottom: 10px; font-size: 12px;">
            <span id="serverStatus" style="color: #48bb78;">● 服务器连接正常</span>
        </div>

        
        <div class="file-upload-area" id="dropArea">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <div class="upload-text">点击或拖拽ZIP文件到此处</div>
            <div class="upload-hint">支持 .zip 格式，最大 50MB</div>
            <div class="file-name" id="fileName"></div>
            <input type="file" id="file-input" accept=".zip" />
        </div>

       
        <div class="requirements">
            <div class="requirements-title">
                <span>📋</span> ZIP包格式要求
            </div>
            <ul class="requirements-list">
                <li>必须包含 jni/ 文件夹</li>
                <li>必须包含 Android.mk</li>
                <li>源码文件放在 jni/ 目录下</li>
                <li>申明:如果进度卡在30%正常现象</li>
                <li>需等1分钟左右完成打包</li>
                <li>本网站会自动清除上传目录</li>
                <li>放心打包，无需担心源码泄露！</li>
            </ul>
        </div>

       
        <div class="button-group">
            <button class="btn btn-primary" id="packBtn" disabled>
                <span>🔨</span> 开始编译
            </button>
            <button class="btn btn-secondary" id="resetBtn" style="display: none;">
                <span>🔄</span> 重新上传
            </button>
        </div>

        <div class="file-list" id="fileList" style="display: none;">
            <div class="file-list-title">📋 选择要下载的SO文件：</div>
            <div id="fileItems"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-success" id="downloadSelectedBtn" style="flex: 1;">
                    <span>⬇️</span> 下载选中文件
                </button>
                <button class="btn btn-primary" id="downloadAllBtn" style="flex: 1;">
                    <span>📦</span> 下载全部
                </button>
            </div>
        </div>

       
        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-status">
                <span id="progressText">准备就绪</span>
                <span id="progressPercentage">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="log-area" id="logArea"></div>
        </div>

     
        <div class="download-area" id="downloadArea">
            <div class="download-message" id="downloadMessage"></div>
        </div>

      
        <div class="debug-info" id="debugInfo">
            <div>服务器: http://120.26.126.144:5000</div>
            <div id="requestStatus"></div>
        </div>

        <div class="footer-note">
            by逊龢  by逊龢  by逊龢
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const SERVER_URL = 'http://120.26.126.144:5000';
        // =============================================

       
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('file-input');
        const fileName = document.getElementById('fileName');
        const packBtn = document.getElementById('packBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fileList = document.getElementById('fileList');
        const fileItems = document.getElementById('fileItems');
        const downloadSelectedBtn = document.getElementById('downloadSelectedBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');
        const progressPercentage = document.getElementById('progressPercentage');
        const progressBar = document.getElementById('progressBar');
        const logArea = document.getElementById('logArea');
        const downloadArea = document.getElementById('downloadArea');
        const downloadMessage = document.getElementById('downloadMessage');
        const debugInfo = document.getElementById('requestStatus');
        const serverStatus = document.getElementById('serverStatus');

       
        let selectedFile = null;
        let isCompiling = false;
        let currentWorkId = null;
        let availableFiles = [];

       
        async function checkServer() {
            try {
                const response = await fetch(SERVER_URL + '/test');
                if (response.ok) {
                    serverStatus.innerHTML = '● 服务器连接正常';
                    serverStatus.style.color = '#48bb78';
                } else {
                    serverStatus.innerHTML = '● 服务器异常';
                    serverStatus.style.color = '#fc8181';
                }
            } catch (error) {
                serverStatus.innerHTML = '● 无法连接到服务器';
                serverStatus.style.color = '#fc8181';
            }
        }

        checkServer();

     
        fileInput.addEventListener('change', handleFileSelect);
        
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('dragover');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFiles(files[0]);
            }
        });

        dropArea.addEventListener('click', () => {
            if (!isCompiling) {
                fileInput.click();
            }
        });

        resetBtn.addEventListener('click', () => {
            resetToUpload();
        });

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length > 0) {
                handleFiles(files[0]);
            }
        }

        function handleFiles(file) {
            if (!file.name.toLowerCase().endsWith('.zip')) {
                showLog('❌ 错误：只能上传ZIP文件', 'error');
                resetFileSelection();
                return;
            }

            const maxSize = 50 * 1024 * 1024;
            if (file.size > maxSize) {
                showLog('❌ 错误：文件大小不能超过50MB', 'error');
                resetFileSelection();
                return;
            }

            selectedFile = file;
            fileName.textContent = `📄 已选择: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            fileName.classList.add('show');
            dropArea.classList.add('has-file');
            packBtn.disabled = false;
            resetBtn.style.display = 'none';
            fileList.style.display = 'none';
            showLog(`✅ 文件已就绪，点击"开始编译"`, 'success');
        }

        function resetFileSelection() {
            selectedFile = null;
            fileInput.value = '';
            fileName.classList.remove('show');
            dropArea.classList.remove('has-file');
            packBtn.disabled = true;
        }

        function resetToUpload() {
            resetFileSelection();
            fileList.style.display = 'none';
            downloadArea.classList.remove('show');
            progressContainer.style.display = 'none';
            resetBtn.style.display = 'none';
            packBtn.style.display = 'block';
            availableFiles = [];
            currentWorkId = null;
        }

        function showLog(message, type = 'info') {
            logArea.textContent = message;
            logArea.className = 'log-area';
            if (type === 'error') {
                logArea.classList.add('error');
            } else if (type === 'success') {
                logArea.classList.add('success');
            }
        }

        function updateProgress(percent, status) {
            progressBar.style.width = `${percent}%`;
            progressPercentage.textContent = `${percent}%`;
            progressText.textContent = status;
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

       
        function showFileList(files, workId) {
            availableFiles = files;
            currentWorkId = workId;
            
            let html = '';
            files.forEach((file, index) => {
                html += `
                    <div class="file-item" data-index="${index}" onclick="selectFile(${index})">
                        <div class="file-info">
                            <div class="file-name-so">${file.name}</div>
                            <div class="file-meta">
                                <span class="file-abi">${file.abi}</span>
                                <span class="file-size">${formatFileSize(file.size)}</span>
                            </div>
                        </div>
                        <div class="download-icon" id="check-${index}">⬇️</div>
                    </div>
                `;
            });
            
            fileItems.innerHTML = html;
            fileList.style.display = 'block';
            packBtn.style.display = 'none';
            resetBtn.style.display = 'block';
            progressContainer.style.display = 'none';
        }

       
        window.selectFile = function(index) {
           
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('selected');
            });
          
            document.querySelector(`.file-item[data-index="${index}"]`).classList.add('selected');
        };

    
        downloadSelectedBtn.addEventListener('click', () => {
            const selected = document.querySelector('.file-item.selected');
            if (!selected) {
                alert('请先选择一个文件');
                return;
            }
            
            const index = selected.dataset.index;
            const file = availableFiles[index];
            downloadFile(file.name);
        });

       
        downloadAllBtn.addEventListener('click', () => {
            // 这里简单起见，先下载第一个，或者可以打包成ZIP
            // 目前服务器不支持批量下载，所以提示
            alert('批量下载功能需要服务器支持，请先选择单个文件下载');
        });

        function downloadFile(filename) {
            if (!currentWorkId) return;
            
            const url = `${SERVER_URL}/download/${currentWorkId}/${filename}`;
            window.location.href = url;
            
            downloadMessage.innerHTML = `✅ 正在下载: ${filename}`;
            downloadArea.classList.add('show');
        }

   
        packBtn.addEventListener('click', async () => {
            if (!selectedFile || isCompiling) return;

            isCompiling = true;
            packBtn.disabled = true;
            downloadArea.classList.remove('show');
            progressContainer.style.display = 'block';
            fileList.style.display = 'none';
            
            updateProgress(0, '准备上传...');
            showLog('📤 正在上传文件...');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', SERVER_URL + '/compile', true);
                xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
                xhr.timeout = 120000;  // 120秒超时

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 30);
                        updateProgress(percent, '上传中...');
                    }
                });

                xhr.onload = function() {
                    debugInfo.innerHTML = `状态码: ${xhr.status}`;
                    
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const contentType = xhr.getResponseHeader('content-type');
                        
                        if (contentType && contentType.includes('application/octet-stream')) {
                          
                            updateProgress(100, '编译完成！');
                            showLog('✅ 编译成功！', 'success');
                            
                           
                            const blob = new Blob([xhr.response], { type: 'application/octet-stream' });
                            const url = URL.createObjectURL(blob);
                            
                            // 从Content-Disposition获取文件名
                            const disposition = xhr.getResponseHeader('content-disposition');
                            let filename = 'lib.so';
                            if (disposition && disposition.includes('filename=')) {
                                filename = disposition.split('filename=')[1].replace(/"/g, '');
                            }
                            
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = filename;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            
                            downloadMessage.innerHTML = `✅ 下载完成: ${filename}`;
                            downloadArea.classList.add('show');
                            
                          
                            resetBtn.style.display = 'block';
                            packBtn.style.display = 'none';
                            
                        } else {
                          
                            try {
                                const data = JSON.parse(xhr.responseText);
                                
                                if (data.multiple_files) {
                                    // 多个文件，显示选择列表
                                    showFileList(data.files, data.work_id);
                                    showLog(`✅ 编译成功，发现 ${data.files.length} 个SO文件`, 'success');
                                } else if (data.error) {
                                    updateProgress(0, '编译失败');
                                    showLog(`❌ ${data.error}\n\n${data.log || ''}`, 'error');
                                } else if (data.warning) {
                                    updateProgress(100, '完成');
                                    showLog(`⚠️ ${data.warning}`, 'info');
                                } else {
                                    updateProgress(100, '完成');
                                    showLog(JSON.stringify(data, null, 2), 'info');
                                }
                            } catch (e) {
                                showLog(xhr.responseText, 'info');
                            }
                        }
                    } else {
                        updateProgress(0, '请求失败');
                        try {
                            const data = JSON.parse(xhr.responseText);
                            showLog(`❌ 错误 ${xhr.status}: ${data.error || xhr.statusText}`, 'error');
                        } catch (e) {
                            showLog(`❌ 错误 ${xhr.status}: ${xhr.statusText}`, 'error');
                        }
                    }
                    
                    isCompiling = false;
                };

                xhr.onerror = function() {
                    updateProgress(0, '网络错误');
                    showLog('❌ 网络连接失败，请检查服务器', 'error');
                    isCompiling = false;
                    packBtn.disabled = false;
                };

                xhr.ontimeout = function() {
                    updateProgress(0, '超时');
                    showLog('❌ 编译超时（超过120秒）', 'error');
                    isCompiling = false;
                    packBtn.disabled = false;
                };

                xhr.send(formData);

            } catch (error) {
                updateProgress(0, '请求失败');
                showLog(`❌ 错误: ${error.message}`, 'error');
                isCompiling = false;
                packBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
